<style>
  :root{
    --bg:#2B453B; --ink:#F4EFE4; --soft:#D8E0D6; --muted:#9FB3A6;
    --accent:#F8D88A; --line:rgba(255,255,255,.08); --line-strong:rgba(255,255,255,.14);
    --font:-apple-system,"Segoe UI",Roboto,Inter,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:var(--font);
    line-height:1.7;
    -webkit-font-smoothing:antialiased;
    display:flex;align-items:center;justify-content:center;
    padding:32px;
  }
  main{text-align:center;max-width:42ch;}
  .mark{
    width:84px;height:84px;border-radius:22px;
    display:block;margin:0 auto 30px;
    box-shadow:0 14px 40px rgba(0,0,0,.32);
  }
  .eyebrow{
    margin:0 0 14px;color:var(--muted);
    font-size:12px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;
  }
  h1{
    margin:0 0 12px;font-size:28px;font-weight:600;
    letter-spacing:-.015em;line-height:1.25;
  }
  p{margin:0 0 30px;color:var(--soft);font-size:16.5px;}
  .home{
    display:inline-flex;align-items:center;gap:10px;
    min-height:50px;padding:0 22px;
    border:1px solid var(--line-strong);border-radius:999px;
    background:rgba(255,255,255,.035);
    color:var(--ink);font-size:15px;font-weight:500;text-decoration:none;
    transition:border-color .2s ease,background-color .2s ease;
  }
  .home .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex:0 0 auto;}
  .home:hover{border-color:var(--accent);background:rgba(255,255,255,.05);}
  .home:focus-visible{outline:2px solid var(--accent);outline-offset:3px;}
  @media (prefers-reduced-motion:reduce){.home{transition:none;}}
</style>
